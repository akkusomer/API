<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Hal Programı</title>
    <script>
        const section = window.location.hash.replace('#', '').toLowerCase();
        const routeMap = {
            dashboard: '/dashboard',
            stocks: '/stocks',
            cariler: '/cariler',
            settings: '/dashboard'
        };
        const targetRoute = routeMap[section] || '/dashboard';
        window.location.replace(`./app/index.html#${targetRoute}${window.location.search}`);
    </script>
</head>
<body>
    <noscript><a href="./app/index.html#/dashboard">Uygulamayı aç</a></noscript>
</body>
</html>
